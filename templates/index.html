<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
</head>
<body>
    <h1>Simple Quiz</h1>
    <form method="POST">
        <p>What is the capital of India?</p>
        <input type="radio" name="answer" value="Delhi"> Delhi<br>
        <input type="radio" name="answer" value="Mumbai"> Mumbai<br>
        <input type="radio" name="answer" value="Chennai"> Chennai<br><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
